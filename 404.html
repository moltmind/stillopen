<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Page not found — StillOpen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;0,6..72,800;1,6..72,400;1,6..72,600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0908;
    --bg-elevated: rgba(245,237,224,0.025);
    --text-primary: rgba(245,237,224,0.96);
    --text-secondary: rgba(245,237,224,0.68);
    --text-tertiary: rgba(245,237,224,0.42);
    --border: rgba(245,237,224,0.08);
    --border-strong: rgba(245,237,224,0.16);
    --brand: #ff7a1a;
    --accent: #ff9248;
    --font-serif: 'Newsreader', 'Georgia', serif;
    --font-sans: 'Inter', -apple-system, system-ui, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-font-smoothing: antialiased; }
  body { font-family: var(--font-sans); background: var(--bg); color: var(--text-primary); line-height: 1.55; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 24px; position: relative; }
  body::before { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; background-image: radial-gradient(rgba(245,237,224,0.045) 1px, transparent 1px); background-size: 22px 22px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { color: var(--brand); }

  .frame {
    position: relative; z-index: 1;
    max-width: 560px; width: 100%;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 56px 48px;
    text-align: center;
  }
  @media (max-width: 540px) { .frame { padding: 40px 28px; } }

  .wordmark { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 32px; font-family: var(--font-serif); font-weight: 600; font-size: 20px; letter-spacing: -0.02em; color: var(--text-primary); }
  .wordmark span { color: var(--accent); }

  .code { display: inline-block; font-family: var(--font-serif); font-style: italic; font-size: 13px; color: var(--text-tertiary); letter-spacing: 2px; text-transform: uppercase; padding-bottom: 4px; border-bottom: 1px solid var(--border-strong); margin-bottom: 18px; }

  h1 { font-family: var(--font-serif); font-variation-settings: 'opsz' 72; font-weight: 600; font-size: 44px; line-height: 1.05; letter-spacing: -0.025em; margin-bottom: 20px; }
  h1 em { font-style: italic; color: var(--accent); font-weight: 500; }

  .lede { font-size: 16px; line-height: 1.65; color: var(--text-secondary); margin-bottom: 32px; }

  .links { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
  .link-card { background: rgba(245,237,224,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; text-align: left; display: flex; align-items: center; justify-content: space-between; gap: 14px; transition: border-color 0.2s, background 0.2s; }
  .link-card:hover { border-color: var(--border-strong); background: rgba(245,237,224,0.05); }
  .link-card-text { color: var(--text-primary); font-size: 14px; font-weight: 500; }
  .link-card-arrow { color: var(--accent); font-size: 18px; }

  .small-note { font-size: 12px; color: var(--text-tertiary); padding-top: 24px; border-top: 1px solid var(--border); }
</style>
</head>
<body>

<div class="frame">
  <a href="/" class="wordmark" aria-label="StillOpen home">
    <svg width="20" height="20" viewBox="0 0 64 64" fill="none" aria-hidden="true">
      <rect x="10" y="8" width="40" height="50" rx="1" fill="none" stroke="#f5ede0" stroke-width="3"/>
      <path d="M10 58 L10 8 L38 14 L38 52 Z" fill="#ff7a1a"/>
      <circle cx="33" cy="34" r="2" fill="#0a0908"/>
    </svg>
    Still<span>Open</span>
  </a>

  <div class="code">404</div>
  <h1>This page <em>doesn't live here.</em></h1>
  <p class="lede">Probably a stale link, a mistyped URL, or a page we retired. Pick one of the live spots below and you'll find what you need.</p>

  <div class="links">
    <a href="/" class="link-card"><span class="link-card-text">StillOpen home</span><span class="link-card-arrow">→</span></a>
    <a href="/#pricing" class="link-card"><span class="link-card-text">Pricing</span><span class="link-card-arrow">→</span></a>
    <a href="/for-medspas/" class="link-card"><span class="link-card-text">For med spas</span><span class="link-card-arrow">→</span></a>
    <a href="/for-photographers/" class="link-card"><span class="link-card-text">For photographers</span><span class="link-card-arrow">→</span></a>
    <a href="/partners/agencies/" class="link-card"><span class="link-card-text">For marketing agencies</span><span class="link-card-arrow">→</span></a>
  </div>

  <p class="small-note">Still stuck? Text Cole at <a href="sms:+15349010258">(534) 901-0258</a>.</p>
</div>

<script>
  // Legacy /d/[slug] demo links — bounce to the static builder template.
  // Keeps every previously shared demo link alive.
  (function () {
    try {
      var path = window.location.pathname || '';
      var m = path.match(/^\/d\/([a-z0-9-]+)\/?$/i);
      if (m && m[1]) {
        window.location.replace('/demo/builder/?slug=' + encodeURIComponent(m[1]));
      }
    } catch (e) {}
  })();
</script>

<!-- StillOpen chatbot widget -->
<script defer src="https://app.stillopen.ai/chatbot.js" data-plumber-id="stillopen"></script>

</body>
</html>

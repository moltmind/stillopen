<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>StillOpen, Demo Retired</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 520px;
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
    }
    .mark {
      color: #f97316;
      font-weight: 700;
      letter-spacing: 0.05em;
      font-size: 14px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 24px;
      margin: 0 0 16px;
      line-height: 1.3;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      color: #cbd5e1;
      margin: 0 0 24px;
    }
    a.cta {
      display: inline-block;
      background: #f97316;
      color: #0f172a;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
    }
    a.cta:hover { background: #fb923c; }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark">StillOpen</div>
    <h1>This demo has been retired.</h1>
    <p>I built this without asking the business owner first, and that was on me. I have taken it down. If you are a home services owner who wants an AI receptionist built the right way, come to the front page.</p>
    <a class="cta" href="/">Go to StillOpen</a>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en" style="color-scheme: dark;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | StillOpen</title>
    <meta name="description" content="Sign in to your StillOpen dashboard. Your AI front desk, always on.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Clerk -->
    <script defer crossorigin="anonymous"
      src="https://clerk.stillopen.ai/npm/@clerk/ui@1/dist/ui.browser.js"></script>
    <script defer crossorigin="anonymous"
      data-clerk-publishable-key="pk_live_Y2xlcmsuc3RpbGxvcGVuLmFpJA"
      src="https://clerk.stillopen.ai/npm/@clerk/clerk-js@6/dist/clerk.browser.js"></script>

    <style>
        :root {
            --bg: #191a1b;
            --bg-card: rgba(255,255,255,0.03);
            --text-primary: #f7f8f8;
            --text-secondary: #d0d6e0;
            --text-tertiary: #8a8f98;
            --brand: #5e6ad2;
            --accent: #7170ff;
            --border: rgba(255,255,255,0.08);
            --error: #f87171;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text-primary); font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px;
        }

        .login-card {
            width: 100%; max-width: 380px; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 40px 32px; position: relative; z-index: 1;
        }

        .logo { text-align: center; margin-bottom: 24px; }
        .logo a { text-decoration: none; font-size: 28px; font-weight: 800; color: var(--brand); letter-spacing: -0.03em; }
        .login-heading { text-align: center; font-size: 16px; font-weight: 500; color: var(--text-secondary); margin-bottom: 24px; }

        .back-link {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-top: 20px; font-size: 13px; color: var(--text-tertiary); text-decoration: none; transition: color 0.2s;
        }
        .back-link:hover { color: var(--text-primary); }

        footer { margin-top: auto; padding-top: 32px; padding-bottom: 16px; }
        footer p { font-size: 11px; color: #3a3d42; }

        #loading-state { padding: 32px 0; text-align: center; }
        .loading-dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 12px; }
        .loading-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--brand); opacity: 0.4; animation: dot-bounce 1s infinite; }
        .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes dot-bounce { 0%, 80%, 100% { transform: scale(1); opacity: 0.4; } 40% { transform: scale(1.3); opacity: 1; } }

        /* Ambient glow */
        .orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }

        /* Clerk dark overrides */
        [data-clerk-component], [data-clerk-component] * { color-scheme: dark !important; }
        [data-clerk-component] div, [data-clerk-component] form, [data-clerk-component] section,
        [data-clerk-component] header, [data-clerk-component] footer, [data-clerk-component] main {
            background: transparent !important; background-color: transparent !important; box-shadow: none !important;
        }
        .cl-rootBox { width: 100% !important; max-width: 100% !important; }
        .cl-card, .cl-signIn-root, .cl-signUp-root, .cl-component,
        [data-clerk-component] [class*="card"], [data-clerk-component] [class*="Card"],
        [data-clerk-component] [class*="root"], [data-clerk-component] [class*="Root"],
        [data-clerk-component] [class*="content"], [data-clerk-component] [class*="Content"] {
            background: transparent !important; box-shadow: none !important; border: none !important; padding: 0 !important; margin: 0 !important;
        }
        .cl-headerTitle, .cl-headerSubtitle,
        [data-clerk-component] [class*="headerTitle"], [data-clerk-component] [class*="headerSubtitle"] { display: none !important; }
        [data-clerk-component] [class*="dev"], [data-clerk-component] [class*="Dev"],
        [data-clerk-component] [class*="badge"], [data-clerk-component] [class*="Badge"],
        [data-clerk-component] [data-mode="development"] { display: none !important; }
        [data-clerk-component] *:not(button):not([class*="Primary"]):not([class*="social"]) { color: var(--text-secondary) !important; }
        .cl-formFieldLabel, [data-clerk-component] label { color: var(--text-secondary) !important; font-weight: 500 !important; }
        .cl-formFieldInput, [data-clerk-component] input {
            background: var(--bg) !important; border: 1px solid var(--border) !important; color: #fff !important; border-radius: 8px !important;
        }
        [data-clerk-component] input:focus { border-color: var(--brand) !important; box-shadow: 0 0 0 3px rgba(94,106,210,0.15) !important; }
        [data-clerk-component] input::placeholder { color: var(--text-tertiary) !important; }
        .cl-formButtonPrimary, [data-clerk-component] button[data-localization-key*="continue"],
        [data-clerk-component] button[data-localization-key*="signIn"] {
            background: var(--brand) !important; color: #fff !important; font-weight: 600 !important; border: none !important; border-radius: 8px !important;
        }
        .cl-socialButtonsBlockButton, [data-clerk-component] button[class*="socialButton"],
        [data-clerk-component] [class*="socialButtons"] button {
            background: var(--bg) !important; border: 1px solid var(--border) !important; border-radius: 8px !important;
        }
        [data-clerk-component] [class*="socialButton"] span { color: #fff !important; }
        .cl-dividerLine, [data-clerk-component] [class*="dividerLine"] { background: var(--border) !important; }
        .cl-dividerText, [data-clerk-component] [class*="dividerText"] { color: var(--text-tertiary) !important; }
        .cl-footerActionLink, [data-clerk-component] a[class*="link"] { color: var(--brand) !important; }
        [data-clerk-component] [class*="powered"], [data-clerk-component] [class*="Powered"],
        [data-clerk-component] [class*="secured"], [data-clerk-component] [class*="Secured"] { opacity: 0.3 !important; }
        .cl-formFieldErrorText { color: var(--error) !important; }
        .cl-form { gap: 12px !important; }
    </style>
</head>
<body>

    <div class="orb" style="width: 400px; height: 400px; background: rgba(94,106,210,0.06); top: -80px; left: -80px;"></div>
    <div class="orb" style="width: 300px; height: 300px; background: rgba(113,112,255,0.04); bottom: -40px; right: -40px;"></div>

    <div class="login-card">
        <div class="logo">
            <a href="/">StillOpen</a>
        </div>
        <div class="login-heading">Sign in to your dashboard</div>

        <div id="clerk-sign-in"></div>

        <div id="loading-state">
            <div class="loading-dots"><span></span><span></span><span></span></div>
            <p style="font-size: 13px; color: var(--text-tertiary);">Loading sign-in...</p>
        </div>
    </div>

    <a href="/" class="back-link">
        <i class="ph ph-arrow-left"></i> Back to stillopen.ai
    </a>

    <footer>
        <p>&copy; 2026 StillOpen</p>
    </footer>

    <script>
    window.addEventListener('load', function() {
        function tryInit() {
            if (typeof Clerk === 'undefined') return false;
            try {
                Clerk.load({
                    ui: window.__internal_ClerkUICtor ? { ClerkUI: window.__internal_ClerkUICtor } : undefined,
                    // Force Clerk to send users to the dashboard after any sign-in
                    // flow — including the auto-sign-in from ?__clerk_ticket= URLs
                    // in the onboarding email. Without this, Clerk falls back to
                    // whatever "after sign-in URL" is configured in the dashboard,
                    // which defaults to the homepage and breaks the onboarding loop.
                    signInForceRedirectUrl: '/app/dashboard.html',
                    signUpForceRedirectUrl: '/app/dashboard.html',
                    signInFallbackRedirectUrl: '/app/dashboard.html',
                    signUpFallbackRedirectUrl: '/app/dashboard.html',
                    appearance: {
                        variables: {
                            colorBackground: '#191a1b',
                            colorText: '#f7f8f8',
                            colorTextSecondary: '#8a8f98',
                            colorInputBackground: '#191a1b',
                            colorInputText: '#ffffff',
                            colorPrimary: '#5e6ad2',
                            colorTextOnPrimaryBackground: '#ffffff',
                            colorDanger: '#f87171',
                            borderRadius: '8px',
                            fontFamily: 'Inter, sans-serif',
                        }
                    }
                }).then(function() {
                    document.getElementById('loading-state').style.display = 'none';

                    if (Clerk.user) {
                        window.location.href = '/app/dashboard.html';
                        return;
                    }

                    Clerk.mountSignIn(document.getElementById('clerk-sign-in'), {
                        forceRedirectUrl: '/app/dashboard.html',
                        fallbackRedirectUrl: '/app/dashboard.html',
                        appearance: {
                            variables: {
                                colorBackground: 'transparent',
                                colorText: '#f7f8f8',
                                colorTextSecondary: '#8a8f98',
                                colorInputBackground: '#191a1b',
                                colorInputText: '#ffffff',
                                colorPrimary: '#5e6ad2',
                                colorTextOnPrimaryBackground: '#ffffff',
                                borderRadius: '8px',
                                fontFamily: 'Inter, sans-serif',
                            },
                            elements: {
                                rootBox: 'w-full',
                                card: '!bg-transparent !shadow-none !border-none !p-0',
                                headerTitle: 'hidden',
                                headerSubtitle: 'hidden',
                            }
                        }
                    });
                }).catch(function(e) { console.warn('Clerk:', e); });
                return true;
            } catch(e) { return false; }
        }

        if (!tryInit()) {
            setTimeout(tryInit, 2000);
            setTimeout(tryInit, 5000);
        }
    });
    </script>
</body>
</html>

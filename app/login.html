<!DOCTYPE html>
<html lang="en" class="scroll-smooth dark" style="color-scheme: dark;">
<head>
    <meta charset="UTF-8">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-X6LMX9VR0Y"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-X6LMX9VR0Y');</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | HomeEdge</title>
    <meta name="description" content="Sign in to your HomeEdge dashboard. Access all your AI-powered real estate tools.">
    <link rel="icon" href="/homeedge-logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
                    colors: {
                        navy: { 900: '#040711', 800: '#0A1128', 700: '#141E3E', 600: '#1D2A54' },
                        cyan: { glow: '#00F2FE', deep: '#4FACFE' },
                        gold: { light: '#F8E9A1', base: '#D4AF37', dark: '#A6821A' }
                    }
                }
            }
        }
    </script>

    <!-- Clerk -->
    <script defer crossorigin="anonymous"
      src="https://clerk.gethomeedge.com/npm/@clerk/ui@1/dist/ui.browser.js"></script>
    <script defer crossorigin="anonymous"
      data-clerk-publishable-key="pk_live_Y2xlcmsuZ2V0aG9tZWVkZ2UuY29tJA"
      src="https://clerk.gethomeedge.com/npm/@clerk/clerk-js@6/dist/clerk.browser.js"></script>

    <style>
        body { background: #040711; color: #fff; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #040711; }
        ::-webkit-scrollbar-thumb { background: #141E3E; border-radius: 3px; }

        /* ============================================================
           NUCLEAR CLERK DARK OVERRIDES v2
           Scorched-earth: force dark on EVERY element Clerk renders.
           ============================================================ */

        /* Force dark color scheme on everything */
        [data-clerk-component],
        [data-clerk-component] * { color-scheme: dark !important; }

        /* Kill ALL backgrounds inside Clerk -- nuclear wildcard */
        [data-clerk-component] div,
        [data-clerk-component] form,
        [data-clerk-component] section,
        [data-clerk-component] header,
        [data-clerk-component] footer,
        [data-clerk-component] main,
        [data-clerk-component] nav,
        [data-clerk-component] aside,
        [data-clerk-component] article {
            background: transparent !important;
            background-color: transparent !important;
            box-shadow: none !important;
        }

        /* Root and card */
        .cl-rootBox { width: 100% !important; max-width: 100% !important; }
        .cl-card, .cl-signIn-root, .cl-signUp-root, .cl-component,
        [data-clerk-component] [class*="card"],
        [data-clerk-component] [class*="Card"],
        [data-clerk-component] [class*="root"],
        [data-clerk-component] [class*="Root"],
        [data-clerk-component] [class*="main"],
        [data-clerk-component] [class*="Main"],
        [data-clerk-component] [class*="content"],
        [data-clerk-component] [class*="Content"] {
            background: transparent !important;
            background-color: transparent !important;
            box-shadow: none !important;
            border: none !important;
            padding: 0 !important;
            margin: 0 !important;
        }
        .cl-main { padding: 0 !important; }

        /* Hide Clerk's own header (we have ours) */
        .cl-headerTitle, .cl-headerSubtitle,
        [data-clerk-component] [class*="headerTitle"],
        [data-clerk-component] [class*="headerSubtitle"] { display: none !important; }

        /* Hide dev mode badge */
        [data-clerk-component] [class*="dev"],
        [data-clerk-component] [class*="Dev"],
        [data-clerk-component] [class*="badge"],
        [data-clerk-component] [class*="Badge"],
        [data-clerk-component] [class*="tagline"],
        [data-clerk-component] [data-mode="development"] {
            display: none !important;
        }

        /* Force all text inside Clerk to be light */
        [data-clerk-component] *:not(button):not([class*="Primary"]):not([class*="social"]) {
            color: #e2e8f0 !important;
        }

        /* Labels */
        .cl-formFieldLabel,
        .cl-formFieldLabel *,
        [data-clerk-component] label,
        [data-clerk-component] label * { color: #cbd5e1 !important; font-weight: 500 !important; }

        /* Inputs */
        .cl-formFieldInput,
        .cl-formFieldInput *,
        .cl-otpCodeFieldInput,
        [data-clerk-component] input,
        [data-clerk-component] [class*="input"],
        [data-clerk-component] [class*="Input"] {
            background: #0A1128 !important;
            background-color: #0A1128 !important;
            border: 1px solid rgba(255,255,255,0.12) !important;
            color: #ffffff !important;
            border-radius: 10px !important;
        }
        [data-clerk-component] input:focus {
            border-color: #00F2FE !important;
            box-shadow: 0 0 0 3px rgba(0,242,254,0.12) !important;
            outline: none !important;
        }
        [data-clerk-component] input::placeholder { color: #64748b !important; }

        /* Primary button */
        .cl-formButtonPrimary,
        [data-clerk-component] button[data-localization-key*="continue"],
        [data-clerk-component] button[data-localization-key*="signIn"],
        [data-clerk-component] [class*="formButtonPrimary"] {
            background: linear-gradient(135deg, #D4AF37, #F8E9A1) !important;
            color: #040711 !important;
            font-weight: 700 !important;
            border: none !important;
            border-radius: 10px !important;
            letter-spacing: 0.01em !important;
        }

        /* Social / OAuth buttons */
        .cl-socialButtonsBlockButton,
        .cl-socialButtonsIconButton,
        [data-clerk-component] button[class*="socialButton"],
        [data-clerk-component] button[class*="Social"],
        [data-clerk-component] button[class*="social"],
        [data-clerk-component] [class*="socialButtons"] button {
            background: #0A1128 !important;
            background-color: #0A1128 !important;
            border: 1px solid rgba(255,255,255,0.12) !important;
            border-radius: 10px !important;
        }
        .cl-socialButtonsBlockButton *,
        .cl-socialButtonsBlockButtonText,
        [data-clerk-component] [class*="socialButton"] span,
        [data-clerk-component] [class*="Social"] span { color: #ffffff !important; }

        /* Dividers */
        .cl-dividerLine,
        [data-clerk-component] [class*="divider"] hr,
        [data-clerk-component] [class*="Divider"] hr,
        [data-clerk-component] [class*="dividerLine"] { background: rgba(255,255,255,0.08) !important; }
        .cl-dividerText,
        [data-clerk-component] [class*="dividerText"] { color: #475569 !important; }

        /* Links */
        .cl-footerActionLink,
        .cl-formResendCodeLink,
        [data-clerk-component] a[class*="link"],
        [data-clerk-component] a[class*="Link"] { color: #00F2FE !important; }

        /* Footer (powered by Clerk etc) */
        .cl-footer,
        [data-clerk-component] [class*="footer"],
        [data-clerk-component] [class*="Footer"] { color: #334155 !important; }
        .cl-footer *,
        [data-clerk-component] [class*="footer"] *,
        [data-clerk-component] [class*="Footer"] * { color: #334155 !important; }

        /* "Secured by Clerk" branding -- dim it */
        [data-clerk-component] [class*="powered"],
        [data-clerk-component] [class*="Powered"],
        [data-clerk-component] [class*="secured"],
        [data-clerk-component] [class*="Secured"] {
            opacity: 0.3 !important;
        }

        /* Identity preview (shows email with edit button) */
        .cl-identityPreview * { color: #e2e8f0 !important; }
        .cl-identityPreviewEditButton * { color: #00F2FE !important; }

        /* Password show/hide button */
        .cl-formFieldInputShowPasswordButton * { color: #64748b !important; }

        /* Errors */
        .cl-formFieldErrorText, .cl-formFieldErrorText * { color: #f87171 !important; }
        .cl-formFieldWarningText, .cl-formFieldWarningText * { color: #fbbf24 !important; }
        .cl-alert, .cl-alert * { color: #f87171 !important; }

        /* Remove extra vertical space */
        .cl-form { gap: 12px !important; }
        .cl-formField { margin-bottom: 0 !important; }

        /* Ambient */
        .orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col items-center justify-center relative px-4">

    <div class="orb w-[500px] h-[500px] bg-cyan-glow/10 -top-20 -left-20"></div>
    <div class="orb w-[400px] h-[400px] bg-gold-base/5 bottom-0 right-0"></div>

    <!-- Login Card -->
    <div class="relative z-10 w-full max-w-sm">
        <div class="bg-navy-800/60 backdrop-blur-xl border border-white/[0.06] rounded-2xl p-8">

            <!-- Logo -->
            <div class="text-center mb-6">
                <a href="/" class="inline-block">
                    <span class="font-serif text-3xl font-bold bg-gradient-to-r from-cyan-glow to-gold-base bg-clip-text text-transparent">HomeEdge</span>
                </a>
            </div>

            <!-- Heading -->
            <div class="text-center mb-6">
                <h2 class="text-lg font-semibold text-white">Sign in to your dashboard</h2>
            </div>

            <!-- Clerk mounts here -->
            <div id="clerk-sign-in"></div>

            <!-- Fallback while Clerk loads -->
            <div id="loading-state" class="py-8 text-center">
                <div class="flex justify-center gap-1.5 mb-3">
                    <div class="w-2 h-2 rounded-full bg-cyan-glow/60 animate-bounce" style="animation-delay:0s"></div>
                    <div class="w-2 h-2 rounded-full bg-cyan-glow/60 animate-bounce" style="animation-delay:0.15s"></div>
                    <div class="w-2 h-2 rounded-full bg-cyan-glow/60 animate-bounce" style="animation-delay:0.3s"></div>
                </div>
                <p class="text-xs text-gray-500">Loading sign-in...</p>
            </div>
        </div>

        <!-- Back link -->
        <a href="/" class="flex items-center justify-center gap-2 mt-5 text-sm text-gray-500 hover:text-cyan-glow transition-colors">
            <i class="ph ph-arrow-left"></i> Back to gethomeedge.com
        </a>
    </div>

    <footer class="relative z-10 mt-auto pt-8 pb-4">
        <p class="text-[11px] text-gray-700">&copy; 2026 HomeEdge</p>
    </footer>

    <script>
    window.addEventListener('load', function() {
        function tryInit() {
            if (typeof Clerk === 'undefined') return false;
            try {
                Clerk.load({
                    ui: window.__internal_ClerkUICtor ? { ClerkUI: window.__internal_ClerkUICtor } : undefined,
                    appearance: {
                        variables: {
                            colorBackground: '#0A1128',
                            colorText: '#e2e8f0',
                            colorTextSecondary: '#94A3B8',
                            colorInputBackground: '#0A1128',
                            colorInputText: '#ffffff',
                            colorPrimary: '#D4AF37',
                            colorTextOnPrimaryBackground: '#040711',
                            colorDanger: '#f87171',
                            borderRadius: '10px',
                            fontFamily: 'Inter, sans-serif',
                        }
                    }
                }).then(function() {
                    document.getElementById('loading-state').style.display = 'none';

                    if (Clerk.user) {
                        window.location.href = '/app/dashboard.html';
                        return;
                    }

                    Clerk.mountSignIn(document.getElementById('clerk-sign-in'), {
                        appearance: {
                            variables: {
                                colorBackground: 'transparent',
                                colorText: '#e2e8f0',
                                colorTextSecondary: '#94A3B8',
                                colorInputBackground: '#0A1128',
                                colorInputText: '#ffffff',
                                colorPrimary: '#D4AF37',
                                colorTextOnPrimaryBackground: '#040711',
                                borderRadius: '10px',
                                fontFamily: 'Inter, sans-serif',
                            },
                            elements: {
                                rootBox: 'w-full',
                                card: '!bg-transparent !shadow-none !border-none !p-0',
                                headerTitle: 'hidden',
                                headerSubtitle: 'hidden',
                                socialButtonsBlockButton: '!bg-[#0A1128] !border-white/[0.12] !rounded-[10px]',
                                socialButtonsBlockButtonText: '!text-white',
                                dividerLine: '!bg-white/[0.08]',
                                dividerText: '!text-slate-600',
                                formFieldLabel: '!text-slate-300',
                                formFieldInput: '!bg-[#0A1128] !border-white/[0.12] !text-white !rounded-[10px]',
                                formButtonPrimary: '!bg-gradient-to-r !from-[#D4AF37] !to-[#F8E9A1] !text-[#040711] !font-bold !rounded-[10px] !border-none',
                                footerAction: '!text-slate-500',
                                footerActionLink: '!text-cyan-400',
                                identityPreviewText: '!text-white',
                                identityPreviewEditButton: '!text-cyan-400',
                                formFieldInputShowPasswordButton: '!text-slate-500',
                                otpCodeFieldInput: '!bg-[#0A1128] !border-white/[0.12] !text-white',
                                formFieldErrorText: '!text-red-400',
                                alertText: '!text-red-400',
                            }
                        }
                    });
                }).catch(function(e) { console.warn('Clerk:', e); });
                return true;
            } catch(e) { return false; }
        }

        if (!tryInit()) {
            setTimeout(tryInit, 2000);
            setTimeout(tryInit, 5000);
        }
    });
    </script>
</body>
</html>

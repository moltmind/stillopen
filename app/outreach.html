<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Outreach Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1115;
      --bg-card: #1a1d24;
      --bg-elev: #232732;
      --border: rgba(255,255,255,0.08);
      --text: #f4f5f7;
      --text-muted: #9aa1ae;
      --text-dim: #6b7280;
      --orange: #f97316;
      --orange-dim: #c2410c;
      --green: #10b981;
      --blue: #3b82f6;
      --red: #ef4444;
      --yellow: #f59e0b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; padding-bottom: 120px; }

    .lock-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 24px; z-index: 1000; }
    .lock-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 32px; max-width: 360px; width: 100%; text-align: center; }
    .lock-card h1 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .lock-card p { color: var(--text-muted); font-size: 13px; margin-bottom: 16px; }
    .lock-card input { width: 100%; padding: 10px 12px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; font-family: inherit; }
    .lock-card input:focus { outline: 1px solid var(--orange); border-color: var(--orange); }
    .lock-card button { width: 100%; padding: 10px 12px; margin-top: 10px; background: var(--orange); border: none; border-radius: 8px; color: #fff; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; transition: background 0.15s; }
    .lock-card button:hover { background: var(--orange-dim); }
    .lock-card button:active { transform: scale(0.98); }
    .lock-error { color: var(--red); font-size: 12px; margin-top: 8px; min-height: 14px; }

    header { background: var(--bg-card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
    .header-inner { max-width: 1200px; margin: 0 auto; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }
    .header-title { display: flex; align-items: center; gap: 12px; }
    .header-title .dot { width: 10px; height: 10px; background: var(--orange); border-radius: 50%; box-shadow: 0 0 12px var(--orange); }
    .header-title h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
    .header-title .sub { font-size: 11px; color: var(--text-dim); margin-left: 8px; }
    .header-stats { display: flex; gap: 20px; font-size: 12px; color: var(--text-muted); }
    .header-stats strong { color: var(--text); font-weight: 600; }

    .filters { background: var(--bg); border-bottom: 1px solid var(--border); padding: 12px 24px; position: sticky; top: 64px; z-index: 49; overflow-x: auto; }
    .filters-inner { max-width: 1200px; margin: 0 auto; display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap; }
    .filter-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .filter-btn.active { background: var(--orange); color: #fff; border-color: var(--orange); }
    .filter-btn .count { font-weight: 700; margin-left: 4px; opacity: 0.8; }

    main { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; }

    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; transition: border-color 0.15s; }
    .card.sent { border-color: rgba(59,130,246,0.4); }
    .card.replied { border-color: rgba(16,185,129,0.5); background: rgba(16,185,129,0.04); }
    .card.demo { border-color: rgba(249,115,22,0.5); }
    .card.closed { border-color: var(--green); background: rgba(16,185,129,0.08); }
    .card.declined { opacity: 0.5; }
    .card.ghosted { opacity: 0.4; }

    .card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 8px; }
    .card-shop { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
    .card-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .card-state { font-size: 10px; padding: 3px 7px; border-radius: 4px; background: var(--bg-elev); color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0; }
    .card-state.cold { background: var(--bg-elev); color: var(--text-muted); }
    .card-state.sent { background: rgba(59,130,246,0.2); color: var(--blue); }
    .card-state.replied { background: rgba(16,185,129,0.2); color: var(--green); }
    .card-state.demo { background: rgba(249,115,22,0.2); color: var(--orange); }
    .card-state.closed { background: var(--green); color: #fff; }
    .card-state.declined { background: rgba(239,68,68,0.2); color: var(--red); }
    .card-state.ghosted { background: var(--bg-elev); color: var(--text-dim); }

    .card-signal { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; padding: 8px 10px; background: var(--bg-elev); border-radius: 6px; line-height: 1.5; }
    .card-signal::before { content: "Signal: "; color: var(--orange); font-weight: 600; }

    .card-dm { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 12px; line-height: 1.6; color: var(--text-muted); margin-bottom: 12px; max-height: 180px; overflow-y: auto; white-space: pre-wrap; }

    .card-actions { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .btn { background: var(--bg-elev); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
    .btn:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); }
    .btn.btn-primary { background: var(--orange); border-color: var(--orange); color: #fff; }
    .btn.btn-primary:hover { background: var(--orange-dim); border-color: var(--orange-dim); }
    .btn.btn-text { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.3); color: var(--blue); }
    .btn.btn-text:hover { background: rgba(59,130,246,0.25); }
    .btn.btn-fb { background: rgba(99,102,241,0.15); border-color: rgba(99,102,241,0.3); color: #a5b4fc; }
    .btn.btn-replied { background: rgba(16,185,129,0.15); border-color: rgba(16,185,129,0.3); color: var(--green); }
    .btn.btn-demo { background: rgba(249,115,22,0.15); border-color: rgba(249,115,22,0.3); color: var(--orange); }
    .btn.btn-closed { background: var(--green); border-color: var(--green); color: #fff; }
    .btn.btn-declined { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.2); color: var(--red); }
    .btn.btn-reset { background: transparent; border-color: var(--border); color: var(--text-dim); font-size: 10px; padding: 4px 8px; }

    .card-reply { margin-top: 8px; }
    .card-reply textarea { width: 100%; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; font-family: inherit; resize: vertical; min-height: 60px; }
    .card-reply textarea:focus { outline: 1px solid var(--green); border-color: var(--green); }
    .card-reply-saved { font-size: 10px; color: var(--green); margin-top: 4px; }

    .card-stamp { font-size: 10px; color: var(--text-dim); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }

    .copy-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--green); color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; z-index: 100; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    .copy-toast.show { opacity: 1; }

    .empty { text-align: center; padding: 60px 24px; color: var(--text-dim); font-size: 14px; }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
      .header-stats { font-size: 11px; gap: 12px; }
      .header-title h1 { font-size: 14px; }
    }
  </style>
</head>

// ─── STATE MANAGEMENT ──────────────────────────────────────────────────────────
function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function getLeadState(id) {
  const state = loadState();
  return state[id] || { status: "cold" };
}
function setLeadState(id, patch) {
  const state = loadState();
  state[id] = { ...(state[id] || { status: "cold" }), ...patch };
  saveState(state);
  render();
}

// ─── ACCESS GATE ───────────────────────────────────────────────────────────────
function tryUnlock(key) {
  if (key === ACCESS_KEY) {
    sessionStorage.setItem("outreach-unlocked", "1");
    document.getElementById("lock").style.display = "none";
    document.getElementById("app-header").style.display = "block";
    document.getElementById("app-filters").style.display = "block";
    document.getElementById("app-main").style.display = "block";
    render();
    return true;
  }
  return false;
}
if (sessionStorage.getItem("outreach-unlocked") === "1") {
  tryUnlock(ACCESS_KEY);
}
function submitUnlock() {
  const val = document.getElementById("lock-input").value;
  if (!tryUnlock(val)) {
    document.getElementById("lock-error").textContent = "Wrong key.";
  }
}
document.getElementById("lock-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") submitUnlock();
});
document.getElementById("lock-submit").addEventListener("click", submitUnlock);

// ─── FILTERS ───────────────────────────────────────────────────────────────────
let activeFilter = "all";
const FILTERS = [
  { id: "all", label: "All" },
  { id: "cold", label: "Cold" },
  { id: "sent", label: "Sent" },
  { id: "replied", label: "Replied" },
  { id: "demo", label: "Demo" },
  { id: "closed", label: "Closed" },
  { id: "declined", label: "Declined / Ghosted" },
];
function renderFilters() {
  const counts = {};
  LEADS.forEach(l => {
    const s = getLeadState(l.id).status || "cold";
    counts[s] = (counts[s] || 0) + 1;
  });
  counts.all = LEADS.length;
  counts.sent = (counts["sent-text"] || 0) + (counts["sent-fb"] || 0) + (counts.sent || 0);
  counts.declined = (counts.declined || 0) + (counts.ghosted || 0);

  const container = document.getElementById("filter-buttons");
  container.innerHTML = "";
  FILTERS.forEach(f => {
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (activeFilter === f.id ? " active" : "");
    btn.innerHTML = `${f.label}<span class="count">${counts[f.id] || 0}</span>`;
    btn.onclick = () => { activeFilter = f.id; render(); };
    container.appendChild(btn);
  });
}

// ─── COUNTERS ──────────────────────────────────────────────────────────────────
function renderCounters() {
  const today = new Date().toISOString().slice(0,10);
  const state = loadState();
  let sentToday = 0, replies = 0, demos = 0, closed = 0;
  Object.values(state).forEach(s => {
    if ((s.status === "sent-text" || s.status === "sent-fb") && s.sentAt && s.sentAt.slice(0,10) === today) sentToday++;
    if (s.status === "replied") replies++;
    if (s.status === "demo") demos++;
    if (s.status === "closed") closed++;
  });
  document.getElementById("stat-sent-today").textContent = sentToday;
  document.getElementById("stat-replies").textContent = replies;
  document.getElementById("stat-demos").textContent = demos;
  document.getElementById("stat-closed").textContent = closed;
}

// ─── CARDS ─────────────────────────────────────────────────────────────────────
function buildSmsLink(phone, body) {
  if (!phone) return null;
  const encoded = encodeURIComponent(body);
  return `sms:${phone}&body=${encoded}`;
}
function copyDm(body) {
  navigator.clipboard.writeText(body).then(() => {
    const t = document.getElementById("toast");
    t.textContent = "DM copied to clipboard";
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 1400);
  });
}
function statusLabel(s) {
  const map = { cold: "Cold", "sent-text": "Sent (Text)", "sent-fb": "Sent (FB)", replied: "Replied", demo: "Demo Requested", closed: "Closed Won", declined: "Declined", ghosted: "Ghosted" };
  return map[s] || s;
}
function statusClass(s) {
  if (s === "sent-text" || s === "sent-fb") return "sent";
  return s;
}

function matchesFilter(leadStatus) {
  if (activeFilter === "all") return true;
  if (activeFilter === "sent") return leadStatus === "sent-text" || leadStatus === "sent-fb";
  if (activeFilter === "declined") return leadStatus === "declined" || leadStatus === "ghosted";
  return leadStatus === activeFilter;
}

function renderCards() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  let visible = 0;
  LEADS.forEach(lead => {
    const ls = getLeadState(lead.id);
    const status = ls.status || "cold";
    if (!matchesFilter(status)) return;
    visible++;
    const card = document.createElement("div");
    card.className = "card " + statusClass(status);
    const smsLink = buildSmsLink(lead.phone, lead.dm);
    const stamp = ls.sentAt ? new Date(ls.sentAt).toLocaleString() : "";
    card.innerHTML = `
      <div class="card-head">
        <div>
          <div class="card-shop">${lead.shop}</div>
          <div class="card-meta">${lead.city} · ${lead.owner}${lead.phone ? ` · <a href="tel:${lead.phone}" style="color:inherit">${lead.phone}</a>` : " · (no phone)"}</div>
        </div>
        <div class="card-state ${statusClass(status)}">${statusLabel(status)}</div>
      </div>
      <div class="card-signal">${lead.signal}</div>
      <div class="card-dm">${lead.dm}</div>
      <div class="card-actions">
        ${smsLink ? `<a class="btn btn-text" href="${smsLink}" data-action="open-sms" data-id="${lead.id}">📱 Text now</a>` : ""}
        <button class="btn" data-action="copy" data-id="${lead.id}">📋 Copy DM</button>
        <button class="btn btn-text" data-action="set" data-id="${lead.id}" data-status="sent-text">✓ Sent (Text)</button>
        <button class="btn btn-fb" data-action="set" data-id="${lead.id}" data-status="sent-fb">✓ Sent (FB)</button>
        <button class="btn btn-replied" data-action="set" data-id="${lead.id}" data-status="replied">💬 Replied</button>
        <button class="btn btn-demo" data-action="set" data-id="${lead.id}" data-status="demo">🎯 Demo</button>
        <button class="btn btn-closed" data-action="set" data-id="${lead.id}" data-status="closed">💰 Closed</button>
        <button class="btn btn-declined" data-action="set" data-id="${lead.id}" data-status="declined">✕ Declined</button>
        <button class="btn btn-reset" data-action="set" data-id="${lead.id}" data-status="cold">↺ reset</button>
      </div>
      ${(status === "replied" || ls.reply) ? `
        <div class="card-reply">
          <textarea data-action="reply-edit" data-id="${lead.id}" placeholder="Paste their reply here...">${ls.reply || ""}</textarea>
          ${ls.reply ? `<div class="card-reply-saved">Saved · ${ls.replyAt ? new Date(ls.replyAt).toLocaleString() : ""}</div>` : ""}
        </div>` : ""}
      ${stamp ? `<div class="card-stamp">${statusLabel(status)} · ${stamp}</div>` : ""}
    `;
    grid.appendChild(card);
  });
  document.getElementById("empty").style.display = visible === 0 ? "block" : "none";
}

// ─── EVENT DELEGATION ──────────────────────────────────────────────────────────
document.addEventListener("click", (e) => {
  const target = e.target.closest("[data-action]");
  if (!target) return;
  const id = target.dataset.id;
  const action = target.dataset.action;
  if (action === "open-sms") {
    setTimeout(() => {
      if (confirm("Mark this lead as Sent (Text)?")) setLeadState(id, { status: "sent-text", sentAt: new Date().toISOString() });
    }, 600);
  }
  if (action === "copy") {
    const lead = LEADS.find(l => l.id === id);
    if (lead) copyDm(lead.dm);
  }
  if (action === "set") {
    const status = target.dataset.status;
    const patch = { status };
    if (status === "sent-text" || status === "sent-fb") patch.sentAt = new Date().toISOString();
    if (status === "replied") patch.repliedAt = new Date().toISOString();
    if (status === "closed") patch.closedAt = new Date().toISOString();
    setLeadState(id, patch);
  }
});
document.addEventListener("input", (e) => {
  if (e.target.dataset && e.target.dataset.action === "reply-edit") {
    const id = e.target.dataset.id;
    const reply = e.target.value;
    const cur = getLeadState(id);
    setLeadState(id, { reply, replyAt: new Date().toISOString(), status: cur.status === "cold" ? "replied" : cur.status });
  }
});

// ─── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  renderFilters();
  renderCounters();
  renderCards();
}

</script>
</body>
</html>
